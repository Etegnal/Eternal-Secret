<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join Room</title>
  <link rel="stylesheet" href="join.css" />
  <link href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="join-page">
    <div class="home" onclick="location.href='MAİN PAGE.html'" style="cursor:pointer;">HOME</div>
    <h1 class="title">ETERNAL SECRET</h1>
    <h2 class="subtitle">WHO ARE YOU AND WHERE ARE YOU GOING?</h2>

    <div class="card">
      <div class="label">Name and ID</div>

      <div class="input-group" style="position:relative;">
        <div class="input-bg"></div>
        <input type="text" id="playerName" placeholder="Enter your name" 
               style="position:absolute;top:0;left:0;width:100%;height:50px;
                      border:none;background:transparent;color:#D4AB24;
                      font-size:1.8vw;text-align:center;outline:none;" />
      </div>

      <div class="input-group" style="position:relative;">
        <svg class="svg-bg" width="100%" height="50" viewBox="0 0 581 50" preserveAspectRatio="none">
          <path d="M0 25C0 11.469 10.969 0.5 24.5 0.5H556.5C570.031 0.5 581 11.469 581 25C581 38.531 570.031 49.5 556.5 49.5H24.5C10.969 49.5 0 38.531 0 25Z" fill="#370C6B"/>
        </svg>
        <input type="text" id="roomId" placeholder="Room ID" 
               style="position:absolute;top:0;left:0;width:100%;height:50px;
                      border:none;background:transparent;color:#D4AB24;
                      font-size:1.8vw;text-align:center;outline:none;" />
      </div>
    </div>

    <div class="enter-button" id="enterBtn"></div>
    <div class="enter-text" style="cursor:pointer;" id="enterText">ENTER</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    function joinRoom() {
      const playerName = document.getElementById('playerName').value.trim();
      const roomId = document.getElementById('roomId').value.trim();

      if (!playerName) {
        alert('Lütfen isminizi girin!');
        return;
      }
      if (!roomId) {
        alert('Lütfen oda ID girin!');
        return;
      }

      socket.emit('joinRoom', { roomId, playerName }, (response) => {
        if (response.success) {
          window.location.href = `game.html?player=${encodeURIComponent(playerName)}&roomId=${encodeURIComponent(roomId)}`;
        } else {
          alert(response.message);
        }
      });
    }

    document.getElementById('enterBtn').addEventListener('click', createRoom);
    document.getElementById('enterText').addEventListener('click', createRoom);

      function createRoom() {
        const playerName = document.getElementById('playerName').value.trim();

        if (!playerName) {
          alert('Lütfen isminizi girin!');
          return;
        }

        socket.emit('createRoom', { playerName }, (response) => {
          if (response.success) {
            // Oda oluşturulduktan sonra Game Page'e yönlendirme
            window.location.href = `game.html?player=${encodeURIComponent(response.playerName)}&roomId=${encodeURIComponent(response.roomId)}`;
          } else {
            alert('Oda oluşturulamadı!');
          }
        });
      }

  </script>
</body>
</html>
