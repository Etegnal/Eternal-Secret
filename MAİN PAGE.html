<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eternal Secret</title>
  <link rel="stylesheet" href="main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="main-page">
    <!-- Skor Tabelası Sol -->
    <div class="score-box left">
      <svg width="228" height="228" viewBox="0 0 228 228" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 30C0 13.4315 13.4315 0 30 0H198C214.569 0 228 13.4315 228 30V198C228 214.569 214.569 228 198 228H30C13.4315 228 0 214.569 0 198V30Z"
              fill="url(#grad1)" fill-opacity="0.3"/>
        <defs>
          <linearGradient id="grad1" x1="228" y1="286.5" x2="0" y2="286.5" gradientUnits="userSpaceOnUse">
            <stop stop-color="#1970E2"/>
            <stop offset="1" stop-color="#BA1111"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <!-- Skor Tabelası Sağ -->
    <div class="score-box right">
      <svg width="228" height="228" viewBox="0 0 228 228" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 30C0 13.4315 13.4315 0 30 0H198C214.569 0 228 13.4315 228 30V198C228 214.569 214.569 228 198 228H30C13.4315 228 0 214.569 0 198V30Z"
              fill="url(#grad2)" fill-opacity="0.3"/>
        <defs>
          <linearGradient id="grad2" x1="228" y1="276.5" x2="0" y2="276.5" gradientUnits="userSpaceOnUse">
            <stop stop-color="#1970E2"/>
            <stop offset="1" stop-color="#BA1111"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <!-- Başlıklar -->
    <h1 class="title">ETERNAL SECRET</h1>
    <h2 class="subtitle">CAN YOU FIND IT WITHOUT FAULT?</h2>

    <!-- Butonlar -->
     
    <button class="button create-room" onclick="location.href='GAME PAGE.html'">
      CREATE<br />ROOM
    </button>
    <button class="button join-room" onclick="location.href='JOIN PAGE.html'">
      JOIN<br />WITH ID
    </button>
    
  </div>
</body>
</html>
